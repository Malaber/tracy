<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#172554">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="icon" href="/static/img/tracy.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar auth-topbar">
    <a class="brand" href="/" aria-label="Tracy home">
      <span class="brand-mark" aria-hidden="true"><span></span></span>
      <span>{{ app_name }}</span>
    </a>
    {% if user %}
    <div class="account-actions">
      <a class="secondary-button header-link" href="/">Tracker</a>
      <form method="post" action="/logout">
        <button class="secondary-button" type="submit">Sign out</button>
      </form>
    </div>
    {% endif %}
  </header>
  <main class="auth-main">{% block content %}{% endblock %}</main>
  <script type="module">
    import { initFastPasskey } from "/api/v1/auth/assets/fastpasskey.js";
    initFastPasskey({
      translate: (_key, values, fallback) => Object.entries(values).reduce(
        (text, [name, value]) => text.replaceAll(`{${name}}`, String(value)),
        fallback,
      ),
    });
  </script>
</body>
</html>
