services:
  app:
    image: ${TRACY_IMAGE:-ghcr.io/malaber/tracy:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/tracy.db}
      TIMEZONE: ${TIMEZONE:-Europe/Berlin}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      SECRET_KEY: ${SECRET_KEY:-development-only-secret-change-me}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
