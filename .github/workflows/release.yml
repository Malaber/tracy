name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  PYTHON_VERSION: '3.14'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  version:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_ref.outputs.release_sha }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - name: Resolve release commit
        id: release_ref
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: echo "release_sha=${WORKFLOW_SHA:-$DISPATCH_SHA}" >> "$GITHUB_OUTPUT"
      - name: Compute release version
        id: version
        env:
          REF_NAME: main
          RUN_NUMBER: ${{ github.run_number }}
        run: python -m invoke compute-version

  release:
    needs:
      - version
    runs-on: ubuntu-latest
    outputs:
      release_title: ${{ steps.release_meta.outputs.release_title }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.release_sha }}
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Verify tested image
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
        run: docker buildx imagetools inspect "$IMAGE:sha-$RELEASE_SHA"
      - name: Promote image to version and latest
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$RELEASE_VERSION" \
            --tag "$IMAGE:latest" \
            "$IMAGE:sha-$RELEASE_SHA"
      - name: Create Git tag
        env:
          GIT_TAG: ${{ needs.version.outputs.git_tag }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
        run: |
          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$GIT_TAG" "$RELEASE_SHA"
            git push origin "$GIT_TAG"
          fi
      - name: Resolve release title
        id: release_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          gh api "/repos/$REPOSITORY/commits/$RELEASE_SHA/pulls" > associated-pulls.json
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          pulls = json.loads(Path("associated-pulls.json").read_text(encoding="utf-8"))
          base_title = subprocess.run(
              ["git", "log", "-1", "--format=%s", os.environ["RELEASE_SHA"]],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          if pulls:
              pull = pulls[0]
              body = pull.get("body") or ""
              match = re.search(r"(?im)^release title:\s*(?P<title>\S.*)$", body)
              base_title = (
                  match.group("title").strip()
                  if match
                  else (pull.get("title") or base_title).strip()
              )
          release_title = f"v{os.environ['RELEASE_VERSION']}: {base_title}"
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"release_title={release_title}\n")
          PY
      - name: Prepare GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          GIT_TAG: ${{ needs.version.outputs.git_tag }}
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          gh api --method POST \
            "/repos/$REPOSITORY/releases/generate-notes" \
            -f tag_name="$GIT_TAG" \
            -f target_commitish="$RELEASE_SHA" \
            > generated-release-notes.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("generated-release-notes.json").read_text(encoding="utf-8"))
          notes = payload["body"].rstrip()
          image = os.environ["IMAGE"]
          version = os.environ["RELEASE_VERSION"]
          notes += f"\n\n## Container image\n\n- `{image}:{version}`\n- `{image}:latest`"
          Path("release-notes.md").write_text(f"{notes}\n", encoding="utf-8")
          PY
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ needs.version.outputs.git_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
        run: |
          if gh release view "$GIT_TAG" >/dev/null 2>&1; then
            gh release edit "$GIT_TAG" --latest --title "$RELEASE_TITLE" --notes-file release-notes.md
          else
            gh release create "$GIT_TAG" --latest --title "$RELEASE_TITLE" --notes-file release-notes.md
          fi
      - name: Add release summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
        run: |
          {
            echo "## Tracy release"
            echo
            printf 'Release: `%s`\n' "$RELEASE_TITLE"
            printf 'Commit image: `%s`\n' "$IMAGE:sha-$RELEASE_SHA"
            printf 'Version image: `%s`\n' "$IMAGE:$RELEASE_VERSION"
            printf 'Deployment image: `%s`\n' "$IMAGE:latest"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Wake webhooker production deployment
        env:
          WAKE_URL: ${{ vars.WEBHOOKER_PRODUCTION_WAKE_URL }}
          WAKE_SECRET: ${{ secrets.WEBHOOKER_WEBHOOK_SECRET }}
          PUSH_SHA: ${{ needs.version.outputs.release_sha }}
          REPOSITORY: ${{ github.repository }}
          DELIVERY_ID: release-production-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import urllib.request

          if not os.environ["WAKE_URL"] or not os.environ["WAKE_SECRET"]:
              print("Skipping production wake: Webhooker settings are not configured.")
              raise SystemExit(0)
          owner, repo = os.environ["REPOSITORY"].split("/", 1)
          payload = {
              "ref": "refs/heads/main",
              "after": os.environ["PUSH_SHA"],
              "repository": {
                  "name": repo,
                  "full_name": os.environ["REPOSITORY"],
                  "owner": {"login": owner},
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode()
          signature = "sha256=" + hmac.new(
              os.environ["WAKE_SECRET"].encode(), body, hashlib.sha256
          ).hexdigest()
          request = urllib.request.Request(
              os.environ["WAKE_URL"],
              data=body,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "push",
                  "X-GitHub-Delivery": os.environ["DELIVERY_ID"],
                  "X-Hub-Signature-256": signature,
              },
          )
          with urllib.request.urlopen(request) as response:
              print(f"production wake status={response.status}")
          PY
