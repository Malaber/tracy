name: CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke black-check

  python_flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke flake8-check

  python_pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke test-python

  javascript_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke install-js
      - run: python -m invoke check-js

  browser_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_BROWSER_CHANNEL: chrome
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke install-js
      - run: python -m invoke browser-e2e
      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: passkey-browser-e2e
          path: e2e-artifacts/passkey
          retention-days: 2

  version:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - name: Compute image version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: python -m invoke compute-version

  docker_build_platform:
    runs-on: ${{ matrix.runs_on }}
    needs:
      - python_black
      - python_flake8
      - python_pytest
      - javascript_test
      - browser_e2e
      - version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_suffix: linux-amd64
            runs_on: ubuntu-latest
          - platform: linux/arm64
            artifact_suffix: linux-arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            TRACY_VERSION=${{ needs.version.outputs.release_version }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.artifact_suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.artifact_suffix }}
      - name: Export image digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/docker-digests
          touch "/tmp/docker-digests/${IMAGE_DIGEST#sha256:}"
      - uses: actions/upload-artifact@v6
        with:
          name: docker-digest-${{ matrix.artifact_suffix }}
          path: /tmp/docker-digests/*
          if-no-files-found: error
          retention-days: 1

  docker_build:
    runs-on: ubuntu-latest
    needs:
      - docker_build_platform
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v6
        with:
          pattern: docker-digest-*
          path: /tmp/docker-digests
          merge-multiple: true
      - name: Merge platform images
        id: merge
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          sources=()
          for digest_file in /tmp/docker-digests/*; do
            [ -e "$digest_file" ] || continue
            sources+=("$IMAGE@sha256:$(basename "$digest_file")")
          done
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "No platform digests were downloaded." >&2
            exit 1
          fi
          docker buildx imagetools create --tag "$IMAGE:$IMAGE_TAG" "${sources[@]}"
          digest="$(docker buildx imagetools inspect "$IMAGE:$IMAGE_TAG" | awk '/Digest:/ { print $2; exit }')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Add Docker image summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_DIGEST: ${{ steps.merge.outputs.digest }}
        run: |
          {
            echo "## Tested container image"
            echo
            printf 'Image: `%s`\n' "$IMAGE:sha-$GITHUB_SHA"
            printf 'Digest: `%s`\n' "$IMAGE_DIGEST"
            echo
            docker buildx imagetools inspect "$IMAGE:sha-$GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
